name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-portfolio/package-lock.json

      - name: Verify project directory
        run: |
          pwd
          ls -la
          ls -la my-portfolio

      - name: Install dependencies (prefer ci)
        working-directory: my-portfolio
        run: npm ci --no-audit --no-fund
        continue-on-error: true

      - name: Fallback install
        if: ${{ failure() }}
        working-directory: my-portfolio
        run: npm install --no-audit --no-fund

      - name: Build with repository base path
        working-directory: my-portfolio
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: npm run build -- --base="/${REPO_NAME}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-portfolio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
